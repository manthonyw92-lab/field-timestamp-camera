<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Field Timestamp Camera</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1C2A4A">

  <!-- iOS home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FieldCam">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Camera viewport -->
    <div id="camera-view">
      <video id="preview" autoplay playsinline muted></video>

      <!-- Draggable timestamp overlay (double-tap address line to edit) -->
      <div id="overlay-drag" data-bg="black">
        <div id="overlay-text"></div>
      </div>

      <!-- Zoom level pill — tap to cycle presets, pinch to zoom freely -->
      <div id="zoom-pill">1.0×</div>

      <!-- White flash on capture -->
      <div id="capture-flash"></div>

      <!-- GPS / status pill -->
      <div id="status-bar"></div>
    </div>

    <!-- Bottom controls: flash | gallery | shutter | bg | job -->
    <div id="controls">
      <button id="flash-btn"   class="ctrl-btn" title="Toggle flash" disabled>⚡</button>
      <button id="gallery-btn" class="ctrl-btn" title="Captured photos">
        <span id="gallery-icon">📷</span>
        <span id="gallery-badge" class="badge hidden">0</span>
      </button>
      <button id="shutter"     class="ctrl-btn shutter-btn" title="Take photo"></button>
      <button id="bg-btn"      class="ctrl-btn" title="Overlay background">■</button>
      <button id="job-btn"     class="ctrl-btn" title="Job &amp; Crew">🪪</button>
    </div>

  </div>

  <!-- ── Address edit modal ───────────────────────────────────────────── -->
  <div id="addr-modal" class="modal-backdrop hidden">
    <div class="modal">
      <p class="modal-title">Edit Address</p>
      <input id="addr-input" type="text" placeholder="Enter address…" autocomplete="off">
      <div class="modal-btns">
        <button id="addr-gps-btn"    class="modal-btn secondary">Use GPS</button>
        <button id="addr-cancel-btn" class="modal-btn secondary">Cancel</button>
        <button id="addr-save-btn"   class="modal-btn primary">Save</button>
      </div>
    </div>
  </div>

  <!-- ── Job & Crew modal ────────────────────────────────────────────── -->
  <div id="job-modal" class="modal-backdrop hidden">
    <div class="modal">
      <p class="modal-title">Job &amp; Crew</p>
      <label class="modal-label">Job Name</label>
      <input id="job-input"  type="text" placeholder="e.g. Smith Residence #4521" autocomplete="off">
      <label class="modal-label">Crew Name</label>
      <input id="crew-input" type="text" placeholder="e.g. Martinez / Johnson" autocomplete="off">
      <div class="modal-btns">
        <button id="job-cancel-btn" class="modal-btn secondary">Cancel</button>
        <button id="job-save-btn"   class="modal-btn primary">Save</button>
      </div>
    </div>
  </div>

  <!-- ── Photo gallery panel ──────────────────────────────────────────── -->
  <div id="gallery-panel" class="hidden">
    <div class="gallery-header">
      <span id="gallery-count">0 photos</span>
      <div class="gallery-actions">
        <button id="share-all-btn"  class="panel-btn primary">Share All</button>
        <button id="save-device-btn" class="panel-btn save">Save to Device</button>
        <button id="clear-all-btn"  class="panel-btn danger">Clear</button>
        <button id="close-gallery-btn" class="panel-btn icon">✕</button>
      </div>
    </div>
    <div id="gallery-grid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.js"></script>
  <script src="app.js"></script>
</body>
</html>
